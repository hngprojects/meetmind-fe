name: CD

on:
  push:
    branches: [staging, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hngprojects/meetmind-fe

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build & Push Docker image to GHCR
  # VITE_API_BASE_URL is baked in at build time per environment
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA tag
        id: tag
        run: echo "short_sha=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set API URL per environment
        id: api_url
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "url=https://api.staging.meetmind.hng14.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://api.meetmind.hng14.com" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ steps.api_url.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Staging
  # Triggers on: push to staging branch
  # Live URL: https://staging.meetmind.hng14.com
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.meetmind.hng14.com

    steps:
      - name: Deploy to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/meetmind/staging
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull frontend
            docker compose up -d --no-deps --force-recreate frontend
            echo "✅ Staging frontend deployed: $IMAGE_TAG"
            docker compose ps

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Production
  # Triggers on: push to main branch (only after staging validated)
  # Live URL: https://meetmind.hng14.com
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://meetmind.hng14.com

    steps:
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/meetmind/production
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull frontend
            docker compose up -d --no-deps --force-recreate frontend
            echo "✅ Production frontend deployed: $IMAGE_TAG"
            docker compose ps